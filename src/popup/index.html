<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }
    .header {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-icon {
      width: 20px;
      height: 20px;
      background: #3b82f6;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    .divider {
      height: 1px;
      background: rgba(148, 163, 184, 0.15);
      margin: 12px 0;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .label {
      font-size: 13px;
      color: #cbd5e1;
    }
    .switch {
      position: relative;
      width: 42px;
      height: 22px;
      display: inline-block;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #475569;
      border-radius: 11px;
      transition: 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.25s;
    }
    input:checked + .slider {
      background: #3b82f6;
    }
    input:checked + .slider::before {
      transform: translateX(20px);
    }
    input:disabled + .slider {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .test-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 6px;
      background: rgba(51, 65, 85, 0.4);
      color: #cbd5e1;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }
    .test-btn:hover:not(:disabled) {
      background: rgba(51, 65, 85, 0.7);
      color: #f1f5f9;
    }
    .test-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .secondary-group {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .secondary-btn {
      flex: 1;
      padding: 6px 0;
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .secondary-btn:hover:not(:disabled) {
      background: rgba(51, 65, 85, 0.4);
      color: #cbd5e1;
    }
    .secondary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      font-size: 12px;
      color: #64748b;
      margin-top: 12px;
      text-align: center;
    }
    .status.error {
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">D</span>
    DevOps Watcher
  </div>
  <div id="content">
    <div class="status">检测中...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
